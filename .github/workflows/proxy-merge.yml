name: Proxy Pool Merge and Test

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run proxy merge and test
        run: |
          cat << 'PYEOF' > merge_test.py
          import asyncio
          import base64
          import ssl
          import time
          import urllib.request

          SOURCES = [
              "https://ghproxy.net/https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/sub/sub_merge.txt",
              "https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/sub/sub_merge.txt",
          ]

          TIMEOUT_TCP = 2      # 死节点 2 秒放弃
          TIMEOUT_HTTP = 3   # HTTP 测试 3 秒放弃
          MAX_DELAY_MS = 5000
          CONCURRENCY = 500   # 提高并发

          def fetch_source(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      data = resp.read()
                      text = data.decode("utf-8", errors="ignore")
                      if not ("ss://" in text or "trojan://" in text):
                          try:
                              text = base64.b64decode(data).decode("utf-8", errors="ignore")
                          except Exception:
                              pass
                      lines = [line.strip() for line in text.splitlines() if line.strip()]
                      print(f"[FETCH] {url} -> {len(lines)} nodes")
                      return lines
              except Exception as e:
                  print(f"[ERROR] Fetch failed {url}: {e}")
                  return []

          def parse_node_url(node):
              try:
                  if node.startswith("ss://"):
                      body = node[5:]
                      if "@" in body:
                          before_at, after_at = body.split("@", 1)
                      else:
                          try:
                              decoded = base64.b64decode(body.split("#")[0].split("?")[0]).decode("utf-8", errors="ignore")
                              if "@" in decoded:
                                  before_at, after_at = decoded.split("@", 1)
                              else:
                                  return None
                          except Exception:
                              return None
                      after_at = after_at.split("#")[0].split("?")[0]
                      if ":" in after_at:
                          host, port_str = after_at.rsplit(":", 1)
                          return (host, int(port_str))
                  elif node.startswith("trojan://"):
                      body = node[9:]
                      if "@" in body:
                          _, after_at = body.split("@", 1)
                          after_at = after_at.split("#")[0].split("?")[0]
                          if ":" in after_at:
                              host, port_str = after_at.rsplit(":", 1)
                              return (host, int(port_str))
              except Exception:
                  pass
              return None

          async def tcp_test(host, port):
              try:
                  start = time.time()
                  reader, writer = await asyncio.wait_for(
                      asyncio.open_connection(host, port), timeout=TIMEOUT_TCP
                  )
                  writer.close()
                  await writer.wait_closed()
                  return int((time.time() - start) * 1000)
              except Exception:
                  return None

          def parse_status_code(data):
              try:
                  first_line = data.split(b"\r\n")[0].decode("utf-8", errors="ignore")
                  parts = first_line.split()
                  if len(parts) >= 2:
                      return int(parts[1])
              except Exception:
                  pass
              return None

          async def url_test(host, port):
              """极简 HTTP 测试：443/8443 走 HTTPS，其余走 HTTP，无 fallback"""
              try:
                  start = time.time()
                  use_ssl = port in (443, 8443)
                  if use_ssl:
                      ctx = ssl.create_default_context()
                      ctx.check_hostname = False
                      ctx.verify_mode = ssl.CERT_NONE
                      reader, writer = await asyncio.wait_for(
                          asyncio.open_connection(host, port, ssl=ctx), timeout=TIMEOUT_HTTP
                      )
                  else:
                      reader, writer = await asyncio.wait_for(
                          asyncio.open_connection(host, port), timeout=TIMEOUT_HTTP
                      )
                  req = (
                      b"GET /generate_204 HTTP/1.1\r\n"
                      + b"Host: " + host.encode() + b"\r\n"
                      + b"Connection: close\r\n\r\n"
                  )
                  writer.write(req)
                  await writer.drain()
                  data = await asyncio.wait_for(reader.read(1024), timeout=TIMEOUT_HTTP)
                  writer.close()
                  await writer.wait_closed()
                  if not data:
                      return None
                  code = parse_status_code(data)
                  if code is None or not (100 <= code <= 599):
                      return None
                  return int((time.time() - start) * 1000)
              except Exception:
                  return None

          async def process_node(node, semaphore):
              async with semaphore:
                  if not (node.startswith("ss://") or node.startswith("trojan://")):
                      return None
                  parsed = parse_node_url(node)
                  if not parsed:
                      return None
                  host, port = parsed

                  tcp_delay = await tcp_test(host, port)
                  if tcp_delay is None:
                      return None

                  url_delay = await url_test(host, port)
                  if url_delay is None:
                      return None

                  delay = url_delay
                  if delay > MAX_DELAY_MS:
                      return None
                  return {"node": node, "delay": delay, "host": host, "port": port}

          async def main():
              # 并行拉取两个源
              fetch_tasks = [asyncio.to_thread(fetch_source, url) for url in SOURCES]
              all_results = await asyncio.gather(*fetch_tasks)
              all_nodes = []
              for nodes in all_results:
                  all_nodes.extend(nodes)

              seen = set()
              unique_nodes = [n for n in all_nodes if not (n in seen or seen.add(n))]
              print(f"[TOTAL] {len(unique_nodes)} unique nodes")

              semaphore = asyncio.Semaphore(CONCURRENCY)
              tasks = [process_node(n, semaphore) for n in unique_nodes]
              results = await asyncio.gather(*tasks)
              valid = [r for r in results if r is not None]
              valid.sort(key=lambda x: x["delay"])

              print(f"[VALID] {len(valid)} nodes after filtering")

              with open("nodes.txt", "w", encoding="utf-8") as f:
                  f.write("\n".join([r["node"] for r in valid]))

              with open("nodes_summary.txt", "w", encoding="utf-8") as f:
                  f.write(f"Total fetched: {len(all_nodes)}\n")
                  f.write(f"Unique: {len(unique_nodes)}\n")
                  f.write(f"Valid (delay <= {MAX_DELAY_MS}ms): {len(valid)}\n\n")
                  for r in valid[:50]:
                      f.write(f"{r['delay']}ms | {r['host']}:{r['port']} | {r['node'][:80]}...\n")

          asyncio.run(main())
          PYEOF
          python merge_test.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nodes.txt nodes_summary.txt
          git commit -m "Update proxies $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
